<div class="table-section">
            <h4>Recent Orders</h4>
            <table>
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Customer Name</th>
                        <th>Item</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>#ORD-001</td>
                        <td class="cust-name">Amit Patel</td>
                        <td class="item-name">Premium Cotton T-Shirt</td>
                        <td class="total-price">₹450</td>
                        <td><span class="status completed">Completed</span></td>
                        <td>
                            <button class="action-btn edit"><i class='bx bx-edit'></i></button>
                            <button class="action-btn delete"><i class='bx bx-trash'></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td>#ORD-002</td>
                        <td class="cust-name">Sneha Desai</td>
                        <td class="item-name">Wireless Earbuds</td>
                        <td class="total-price">₹1,200</td>
                        <td><span class="status processing">Processing</span></td>
                        <td>
                            <button class="action-btn edit"><i class='bx bx-edit'></i></button>
                            <button class="action-btn delete"><i class='bx bx-trash'></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        // --- DELETE FUNCTIONALITY ---
        const deleteButtons = document.querySelectorAll('.action-btn.delete');

        deleteButtons.forEach(button => {
            button.addEventListener('click', function() {
                if (confirm('Are you sure you want to delete this order record?')) {
                    this.closest('tr').remove();
                }
            });
        });

        // --- EDIT FUNCTIONALITY ---
        const editButtons = document.querySelectorAll('.action-btn.edit');

        editButtons.forEach(button => {
            button.addEventListener('click', function() {
                const row = this.closest('tr');
                
                // Target the specific cells: [1] Customer, [2] Item, [3] Total
                const customerCell = row.cells[1];
                const itemCell = row.cells[2];
                const totalCell = row.cells[3];

                // Prompt for Customer Name
                let newCustomer = prompt("Edit Customer Name:", customerCell.innerText);
                if (newCustomer !== null && newCustomer.trim() !== "") {
                    customerCell.innerText = newCustomer;
                }

                // Prompt for Item Name
                let newItem = prompt("Edit Item Name:", itemCell.innerText);
                if (newItem !== null && newItem.trim() !== "") {
                    itemCell.innerText = newItem;
                }

                // Prompt for Total Price
                let newTotal = prompt("Edit Total Price:", totalCell.innerText);
                if (newTotal !== null && newTotal.trim() !== "") {
                    // Make sure it keeps the ₹ symbol
                    if (!newTotal.startsWith("₹")) {
                        newTotal = "₹" + newTotal;
                    }
                    totalCell.innerText = newTotal;
                }
            });
        });
    </script>
