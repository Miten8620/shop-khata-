<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Payments & Udhaar</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
   
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body { 
            display: flex; 
            background-color: #081b29; 
            color: #fff;
            min-height: 100vh;
        }

        /* --- SIDEBAR STYLES --- */
        .sidebar { 
            width: 260px; 
            background: rgba(0, 0, 0, 0.2); 
            border-right: 2px solid #0af;
            box-shadow: 5px 0 15px rgba(0, 170, 255, 0.1);
            padding: 30px 0; 
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 { 
            text-align: center; 
            margin-bottom: 40px; 
            color: #0af;
            font-size: 32px;
            text-shadow: 0 0 10px rgba(0, 170, 255, 0.5);
        }
        .sidebar ul { list-style: none; }
        .sidebar ul li { 
            padding: 15px 30px; 
            border-bottom: 1px solid rgba(0, 170, 255, 0.2);
            transition: .4s ease;
        }
        .sidebar ul li a { 
            color: #fff; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            font-size: 16px;
            transition: .4s ease;
        }
        .sidebar ul li a i { font-size: 22px; color: #0af; }
        .sidebar ul li:hover { 
            background: rgba(0, 170, 255, 0.1); 
            border-left: 4px solid #0af;
        }
        .sidebar ul li:hover a { color: #0af; }
        
        /* Active Page Highlight */
        .sidebar ul li.active {
            background: rgba(0, 170, 255, 0.15);
            border-left: 4px solid #0af;
        }

        /* --- MAIN CONTENT STYLES --- */
        .main-content { 
            flex: 1; 
            padding: 30px 40px; 
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: transparent; 
            padding: 20px 30px; 
            border-radius: 10px; 
            border: 2px solid #0af;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.2);
        }
        .header h3 { font-size: 24px; font-weight: 500;}

        .add-btn { 
            position: relative;
            padding: 10px 25px;
            background: transparent;
            border: 2px solid #0af;
            outline: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            z-index: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .add-btn::before {
            content: '';
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 300%;
            background: linear-gradient(#081b29, #0af, #081b29, #0af);
            z-index: -1; transition: .5s;
        }
        .add-btn:hover::before { top: 0; }

        /* --- TABLE STYLES --- */
        .table-container {
            background: transparent;
            border: 2px solid #0af;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.1);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid rgba(0, 170, 255, 0.2); }
        th { color: #0af; font-weight: 600; text-transform: uppercase; font-size: 14px; }
        tr:hover { background: rgba(0, 170, 255, 0.05); }

        /* Status Badges */
        .status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .received { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid #2ecc71; }
        .udhaar { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid #e74c3c; }

        /* Action Buttons */
        .action-btn { background: transparent; border: none; color: #fff; font-size: 20px; cursor: pointer; margin-right: 10px; transition: .3s ease; }
        .action-btn.edit:hover { color: #0af; text-shadow: 0 0 8px #0af;}
        .action-btn.delete:hover { color: #e74c3c; text-shadow: 0 0 8px #e74c3c;}

        /* --- MODAL STYLES --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #081b29; padding: 30px; border-radius: 10px; border: 2px solid #0af;
            box-shadow: 0 0 25px #0af; width: 400px; position: relative;
        }
        .close-btn { position: absolute; top: 10px; right: 20px; color: #fff; font-size: 28px; cursor: pointer; transition: .3s; }
        .close-btn:hover { color: #e74c3c; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #fff; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; background: #081b29; border: 1px solid rgba(0, 170, 255, 0.5);
            border-radius: 5px; color: #fff; font-size: 16px; outline: none; transition: .3s;
        }
        .form-group input:focus, .form-group select:focus { border-color: #0af; box-shadow: 0 0 10px rgba(0, 170, 255, 0.3); }
        .form-group select option { background: #081b29; color: #fff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>My Shop</h2>
        <ul>
            <li><a href="dashboard.html"><i class='bx bxs-dashboard'></i> Dashboard</a></li>
            <li><a href="inventory.html"><i class='bx bx-box'></i> Inventory</a></li>
            <li class="active"><a href="payment.html"><i class='bx bx-rupee'></i> Payments</a></li>
            <li><a href="settings.html"><i class='bx bx-cog'></i> Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h3>Payment Records</h3>
            <button class="add-btn" id="openPaymentModal"><i class='bx bx-plus-circle'></i> Record Transaction</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Customer Name</th>
                        <th>Mobile No.</th>
                        <th>Amount</th>
                        <th>Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="paymentTableBody">
                    <tr>
                        <td>18-Mar-2026</td>
                        <td>Tirth Parekh</td>
                        <td>9876543210</td>
                        <td>₹5,000</td>
                        <td><span class="status received">Payment Received</span></td>
                        <td>
                            <button class="action-btn edit"><i class='bx bx-edit'></i></button>
                            <button class="action-btn delete"><i class='bx bx-trash'></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td>17-Mar-2026</td>
                        <td>Rahul Sharma</td>
                        <td>9123456789</td>
                        <td>₹1,500</td>
                        <td><span class="status udhaar">Udhaar (Due)</span></td>
                        <td>
                            <button class="action-btn edit"><i class='bx bx-edit'></i></button>
                            <button class="action-btn delete"><i class='bx bx-trash'></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closePaymentModal">&times;</span>
            <h2 style="color: #0af; margin-bottom: 20px; text-align: center;">Record Transaction</h2>
            <form id="paymentForm">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="custName" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="custMobile" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="payAmount" required>
                </div>
                <div class="form-group">
                    <label>Transaction Type</label>
                    <select id="payType" required>
                        <option value="received">Payment Received</option>
                        <option value="udhaar">Udhaar (Due)</option>
                    </select>
                </div>
                <button type="submit" class="add-btn" style="width: 100%; justify-content: center; margin-top: 10px;">Save Record</button>
            </form>
        </div>
    </div>
    <script>
        // --- CONFIGURATION ---
const API_URL = 'http://localhost:3000';
const SHOP_ID = 1; // Hardcoded for testing. Use localStorage.getItem('shop_id') later!

// --- DOM ELEMENTS ---
const tableBody = document.getElementById('paymentTableBody');
const modal = document.getElementById('paymentModal');
const openModalBtn = document.getElementById('openPaymentModal');
const closeModalBtn = document.getElementById('closePaymentModal');
const paymentForm = document.getElementById('paymentForm');

// --- MODAL LOGIC ---
openModalBtn.addEventListener('click', () => {
    paymentForm.reset(); // Clear the form
    delete paymentForm.dataset.editId; // Clear any edit state
    modal.style.display = 'flex';
});

closeModalBtn.addEventListener('click', () => {
    modal.style.display = 'none';
});

window.addEventListener('click', (e) => {
    if (e.target === modal) modal.style.display = 'none';
});

// --- Helper: Format Date ---
function formatDate(dateString) {
    const options = { day: '2-digit', month: 'short', year: 'numeric' };
    return new Date(dateString).toLocaleDateString('en-GB', options).replace(/ /g, '-');
}

// --- 1. READ: LOAD PAYMENTS FROM DATABASE ---
async function fetchPayments() {
    try {
        const response = await fetch(`${API_URL}/payments/${SHOP_ID}`);
        const payments = await response.json();
        
        tableBody.innerHTML = ''; // Clear hardcoded rows
        
        payments.forEach(payment => renderPaymentRow(payment));
    } catch (error) {
        console.error('Error loading payments:', error);
    }
}

// Function to draw a single row
function renderPaymentRow(payment) {
    const row = document.createElement('tr');
    
    // Set status badge based on type
    let statusHtml = payment.payment_type === 'received' 
        ? '<span class="status received">Payment Received</span>' 
        : '<span class="status udhaar">Udhaar (Due)</span>';

    row.innerHTML = `
        <td>${formatDate(payment.created_at)}</td>
        <td class="p-name">${payment.customer_name}</td>
        <td class="p-mob">${payment.mobile_no}</td>
        <td class="p-amt">₹${payment.amount}</td>
        <td class="p-type" data-value="${payment.payment_type}">${statusHtml}</td>
        <td>
            <button class="action-btn edit" data-id="${payment.id}"><i class='bx bx-edit'></i></button>
            <button class="action-btn delete" data-id="${payment.id}"><i class='bx bx-trash'></i></button>
        </td>
    `;

    tableBody.appendChild(row);

    // Attach click events
    row.querySelector('.delete').addEventListener('click', () => deletePayment(payment.id));
    row.querySelector('.edit').addEventListener('click', () => openEditModal(payment, row));
}

// --- 2. CREATE & UPDATE: SUBMIT FORM ---
paymentForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const customerName = document.getElementById('custName').value;
    const mobileNo = document.getElementById('custMobile').value;
    const amount = document.getElementById('payAmount').value;
    const paymentType = document.getElementById('payType').value;

    const editId = paymentForm.dataset.editId; // Check if we are editing

    try {
        let response;
        if (editId) {
            // UPDATE Existing
            response = await fetch(`${API_URL}/payments/${editId}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ shop_id: SHOP_ID, customerName, mobileNo, amount, paymentType })
            });
        } else {
            // CREATE New
            response = await fetch(`${API_URL}/payments`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ shop_id: SHOP_ID, customerName, mobileNo, amount, paymentType })
            });
        }

        if (response.ok) {
            modal.style.display = 'none';
            fetchPayments(); // Refresh the table
        } else {
            alert('Failed to save payment to database.');
        }
    } catch (error) {
        console.error('Error saving payment:', error);
    }
});

// --- 3. PREPARE EDIT MODAL ---
function openEditModal(payment, row) {
    // Pre-fill the form with existing data
    document.getElementById('custName').value = payment.customer_name;
    document.getElementById('custMobile').value = payment.mobile_no;
    document.getElementById('payAmount').value = payment.amount;
    document.getElementById('payType').value = payment.payment_type;
    
    // Save the ID so the submit handler knows we are updating, not creating
    paymentForm.dataset.editId = payment.id; 
    
    modal.style.display = 'flex';
}

// --- 4. DELETE PAYMENT ---
async function deletePayment(id) {
    if (!confirm('Are you sure you want to delete this record forever?')) return;

    try {
        const response = await fetch(`${API_URL}/payments/${id}`, {
            method: 'DELETE',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ shop_id: SHOP_ID })
        });

        if (response.ok) {
            fetchPayments(); // Refresh table
        } else {
            alert('Failed to delete from database.');
        }
    } catch (error) {
        console.error('Error deleting payment:', error);
    }
}

// --- START ---
fetchPayments(); // Load data on page load
    </script>

    <script src="script.js"></script>
</body>
</html>
