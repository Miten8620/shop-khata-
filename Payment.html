<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Payments & Udhaar</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
   
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body { 
            display: flex; 
            background-color: #081b29; 
            color: #fff;
            min-height: 100vh;
        }

        /* --- SIDEBAR STYLES --- */
        .sidebar { 
            width: 260px; 
            background: rgba(0, 0, 0, 0.2); 
            border-right: 2px solid #0af;
            box-shadow: 5px 0 15px rgba(0, 170, 255, 0.1);
            padding: 30px 0; 
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 { 
            text-align: center; 
            margin-bottom: 40px; 
            color: #0af;
            font-size: 32px;
            text-shadow: 0 0 10px rgba(0, 170, 255, 0.5);
        }
        .sidebar ul { list-style: none; }
        .sidebar ul li { 
            padding: 15px 30px; 
            border-bottom: 1px solid rgba(0, 170, 255, 0.2);
            transition: .4s ease;
        }
        .sidebar ul li a { 
            color: #fff; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            font-size: 16px;
            transition: .4s ease;
        }
        .sidebar ul li a i { font-size: 22px; color: #0af; }
        .sidebar ul li:hover { 
            background: rgba(0, 170, 255, 0.1); 
            border-left: 4px solid #0af;
        }
        .sidebar ul li:hover a { color: #0af; }
        
        /* Active Page Highlight */
        .sidebar ul li.active {
            background: rgba(0, 170, 255, 0.15);
            border-left: 4px solid #0af;
        }

        /* --- MAIN CONTENT STYLES --- */
        .main-content { 
            flex: 1; 
            padding: 30px 40px; 
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: transparent; 
            padding: 20px 30px; 
            border-radius: 10px; 
            border: 2px solid #0af;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.2);
        }
        .header h3 { font-size: 24px; font-weight: 500;}

        .add-btn { 
            position: relative;
            padding: 10px 25px;
            background: transparent;
            border: 2px solid #0af;
            outline: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            z-index: 1;
            overflow: hidden;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .add-btn::before {
            content: '';
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 300%;
            background: linear-gradient(#081b29, #0af, #081b29, #0af);
            z-index: -1; transition: .5s;
        }
        .add-btn:hover::before { top: 0; }

        /* --- TABLE STYLES --- */
        .table-container {
            background: transparent;
            border: 2px solid #0af;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.1);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th, td { padding: 15px; border-bottom: 1px solid rgba(0, 170, 255, 0.2); }
        th { color: #0af; font-weight: 600; text-transform: uppercase; font-size: 14px; }
        tr:hover { background: rgba(0, 170, 255, 0.05); }

        /* Status Badges */
        .status { padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .received { background: rgba(46, 204, 113, 0.1); color: #2ecc71; border: 1px solid #2ecc71; }
        .udhaar { background: rgba(231, 76, 60, 0.1); color: #e74c3c; border: 1px solid #e74c3c; }

        /* Action Buttons */
        .action-btn { background: transparent; border: none; color: #fff; font-size: 20px; cursor: pointer; margin-right: 10px; transition: .3s ease; }
        .action-btn.edit:hover { color: #0af; text-shadow: 0 0 8px #0af;}
        .action-btn.delete:hover { color: #e74c3c; text-shadow: 0 0 8px #e74c3c;}

        /* --- MODAL STYLES --- */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); justify-content: center; align-items: center;
            z-index: 1000; backdrop-filter: blur(5px);
        }
        .modal-content {
            background: #081b29; padding: 30px; border-radius: 10px; border: 2px solid #0af;
            box-shadow: 0 0 25px #0af; width: 400px; position: relative;
        }
        .close-btn { position: absolute; top: 10px; right: 20px; color: #fff; font-size: 28px; cursor: pointer; transition: .3s; }
        .close-btn:hover { color: #e74c3c; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; color: #fff; margin-bottom: 5px; font-size: 14px; }
        .form-group input, .form-group select {
            width: 100%; padding: 10px; background: #081b29; border: 1px solid rgba(0, 170, 255, 0.5);
            border-radius: 5px; color: #fff; font-size: 16px; outline: none; transition: .3s;
        }
        .form-group input:focus, .form-group select:focus { border-color: #0af; box-shadow: 0 0 10px rgba(0, 170, 255, 0.3); }
        .form-group select option { background: #081b29; color: #fff; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>My Shop</h2>
        <ul>
            <li><a href="dashboard.html"><i class='bx bxs-dashboard'></i> Dashboard</a></li>
            <li><a href="inventory.html"><i class='bx bx-box'></i> Inventory</a></li>
            <li class="active"><a href="payment.html"><i class='bx bx-rupee'></i> Payments</a></li>
            <li><a href="#"><i class='bx bx-cog'></i> Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h3>Payment Records</h3>
            <button class="add-btn" id="openPaymentModal"><i class='bx bx-plus-circle'></i> Record Transaction</button>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Customer Name</th>
                        <th>Mobile No.</th>
                        <th>Amount</th>
                        <th>Type</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="paymentTableBody">
                    <tr>
                        <td>18-Mar-2026</td>
                        <td>Tirth Parekh</td>
                        <td>9876543210</td>
                        <td>₹5,000</td>
                        <td><span class="status received">Payment Received</span></td>
                        <td>
                            <button class="action-btn edit"><i class='bx bx-edit'></i></button>
                            <button class="action-btn delete"><i class='bx bx-trash'></i></button>
                        </td>
                    </tr>
                    <tr>
                        <td>17-Mar-2026</td>
                        <td>Rahul Sharma</td>
                        <td>9123456789</td>
                        <td>₹1,500</td>
                        <td><span class="status udhaar">Udhaar (Due)</span></td>
                        <td>
                            <button class="action-btn edit"><i class='bx bx-edit'></i></button>
                            <button class="action-btn delete"><i class='bx bx-trash'></i></button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" id="closePaymentModal">&times;</span>
            <h2 style="color: #0af; margin-bottom: 20px; text-align: center;">Record Transaction</h2>
            <form id="paymentForm">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="custName" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="custMobile" pattern="[0-9]{10}" required>
                </div>
                <div class="form-group">
                    <label>Amount (₹)</label>
                    <input type="number" id="payAmount" required>
                </div>
                <div class="form-group">
                    <label>Transaction Type</label>
                    <select id="payType" required>
                        <option value="received">Payment Received</option>
                        <option value="udhaar">Udhaar (Due)</option>
                    </select>
                </div>
                <button type="submit" class="add-btn" style="width: 100%; justify-content: center; margin-top: 10px;">Save Record</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
