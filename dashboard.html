<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Dashboard</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
   
    <style>
        /* Import the same Poppins font used in the login page */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Match the deep blue background */
        body { 
            display: flex; 
            background-color: #081b29; 
            color: #fff;
            min-height: 100vh;
        }

        /* Sidebar Styling with a glowing border */
        .sidebar { 
            width: 260px; 
            background: rgba(0, 0, 0, 0.2); 
            border-right: 2px solid #0af;
            box-shadow: 5px 0 15px rgba(0, 170, 255, 0.1);
            padding: 30px 0; 
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 { 
            text-align: center; 
            margin-bottom: 40px; 
            color: #0af;
            font-size: 32px;
            text-shadow: 0 0 10px rgba(0, 170, 255, 0.5);
        }
        .sidebar ul { list-style: none; }
        .sidebar ul li { 
            padding: 15px 30px; 
            border-bottom: 1px solid rgba(0, 170, 255, 0.2);
            transition: .4s ease;
        }
        .sidebar ul li a { 
            color: #fff; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            font-size: 16px;
            transition: .4s ease;
        }
        .sidebar ul li a i {
            font-size: 22px;
            color: #0af;
        }
        /* Hover effects for the sidebar */
        .sidebar ul li:hover { 
            background: rgba(0, 170, 255, 0.1); 
            border-left: 4px solid #0af;
        }
        .sidebar ul li:hover a { color: #0af; }

        /* Main Content Area */
        .main-content { 
            flex: 1; 
            padding: 30px 40px; 
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        /* Header matching the glowing box style */
        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: transparent; 
            padding: 20px 30px; 
            border-radius: 10px; 
            border: 2px solid #0af;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.2);
        }
        .header h3 { font-size: 24px; font-weight: 500;}

        /* Logout Button matching your login .btn style */
        .logout-btn { 
            position: relative;
            padding: 10px 25px;
            background: transparent;
            border: 2px solid #0af;
            outline: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            z-index: 1;
            overflow: hidden;
        }
        .logout-btn::before {
            content: '';
            position: absolute;
            top: -100%;
            left: 0;
            width: 100%;
            height: 300%;
            background: linear-gradient(#081b29, #0af, #081b29, #0af);
            z-index: -1;
            transition: .5s;
        }
        .logout-btn:hover::before { top: 0; }

        /* Dashboard Cards with neon borders and hover glow */
        .cards { 
            display: flex; 
            gap: 30px; 
            flex-wrap: wrap;
        }
        .card { 
            flex: 1; 
            min-width: 250px;
            background: transparent; 
            padding: 30px 20px; 
            border-radius: 10px; 
            border: 2px solid #0af;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.1);
            text-align: center; 
            transition: .4s ease;
        }
        .card:hover {
            box-shadow: 0 0 25px #0af;
            transform: translateY(-5px);
        }
        .card i { 
            margin-bottom: 15px;
            text-shadow: 0 0 10px currentColor; /* Gives the icons a slight glow */
        }
        .card h3 { 
            color: #fff; 
            font-size: 18px; 
            font-weight: 500;
            margin-bottom: 10px;
        }
        .card p { 
            font-size: 28px; 
            font-weight: 700; 
            color: #0af;
            text-shadow: 0 0 5px rgba(0, 170, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>My Shop</h2>
        <ul>
            <li class="active"><a href="dashboard.html"><i class='bx bxs-dashboard'></i> Dashboard</a></li>
            
            <li><a href="inventory.html"><i class='bx bx-box'></i> Inventory</a></li>
            
            <li><a href="payment.html"><i class='bx bx-rupee'></i> Payments</a></li>
            
            <li><a href="#"><i class='bx bx-cog'></i> Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h3>Welcome Back, Shop Owner!</h3>
            <a href="index2.html" class="logout-btn">Logout</a>
        </div>

        <div class="cards">
            <div class="card">
                <i class='bx bxs-user ' style="font-size: 45px; color: #3498db;"></i>
                <h3>Customer Name</h3>
                <p>Tirth Parekh</p>
                <p>7600721592</p>
            </div>
            <div class="card">
                <i class='bx bx-dollar-circle' style="font-size: 45px; color: #2ecc71;"></i>
                <h3>Udhaar</h3>
                <p>₹12,000</p> </div>
            <div class="card">
                <i class='bx bx-rupee' style="font-size: 45px; color: #e74c3c;"></i>
                <h3>Payment</h3>
                <p>₹5,000</p>
            </div>
        </div>
    </div>

</body>
</html>
