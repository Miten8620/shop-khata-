<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login for Shop</title>
<link rel="stylesheet" href="index2.css">

<link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>

</head>
<body>

<div class="wrapper">
    <span class="bg-animate"></span>
    <span class="bg-animate2"></span>

    <div class="form-box login">
      <h2 class="animation" style="--i:0;">Shop Login</h2>
      <form action="#" id="loginForm">
        <div class="input-box animation" style="--i:1;">
          <input type="text" id="login-identifier" required>
          <label>Email or Mobile No.</label>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box animation" style="--i:2;">
          <input type="password" id="login-password" required>
          <label>Password</label>
          <i class='bx bxs-lock-alt'></i>
        </div>
        <button type="submit" class="btn animation" style="--i:3;">Login</button>
        <div class="logreg-link animation" style="--i:4;">
          <p>Don't have a merchant account? <a href="#" class="register-link">Register Shop</a></p>
        </div>
      </form>
    </div>

    <div class="info-text login">
      <h2 class="animation" style="--i:0;">Welcome Back!</h2>
      <p class="animation" style="--i:1;">Manage your inventory, track sales, and grow your business today.</p>
    </div>

    <div class="form-box register">
      <h2 class="animation" style="--i:17;">Register Shop</h2>
      <form action="#" id="registerForm">
        <div class="input-box animation" style="--i:18;">
          <input type="text" id="reg-shopname" required>
          <label>Shop Name</label>
          <i class='bx bx-store-alt'></i> 
        </div>
        <div class="input-box animation" style="--i:19;">
          <input type="text" id="reg-owner" required>
          <label>Owner Name</label>
          <i class='bx bxs-user'></i>
        </div>
        <div class="input-box animation" style="--i:20;">
          <input type="tel" id="reg-mobile" pattern="[0-9]{10}" required> 
          <label>Mobile Number</label>
          <i class='bx bx-phone'></i> 
        </div>
        <div class="input-box animation" style="--i:21;">
          <input type="email" id="reg-email" required>
          <label>Email Address</label>
          <i class='bx bxs-envelope'></i>
        </div>
        <div class="input-box animation" style="--i:22;">
          <input type="password" id="reg-password" required>
          <label>Password</label>
          <i class='bx bxs-lock-alt'></i>
        </div>
        <button type="submit" class="btn animation" style="--i:23;">Register Business</button>
        <div class="logreg-link animation" style="--i:24;">
          <p>Already registered? <a href="#" class="login-link">Login</a></p>
        </div>
      </form>
    </div>

    <div class="info-text register">
      <h2 class="animation" style="--i:25;">Partner With Us!</h2>
      <p class="animation" style="--i:26;">Set up your digital storefront and reach more customers in minutes.</p>
    </div>

  </div>

<script src="script.js"></script>
</body>
</html>
