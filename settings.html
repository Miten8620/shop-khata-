<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Settings</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
   
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body { 
            display: flex; 
            background-color: #081b29; 
            color: #fff;
            min-height: 100vh;
        }

        /* --- SIDEBAR STYLES --- */
        .sidebar { 
            width: 260px; 
            background: rgba(0, 0, 0, 0.2); 
            border-right: 2px solid #0af;
            box-shadow: 5px 0 15px rgba(0, 170, 255, 0.1);
            padding: 30px 0; 
            display: flex;
            flex-direction: column;
        }
        .sidebar h2 { 
            text-align: center; 
            margin-bottom: 40px; 
            color: #0af;
            font-size: 32px;
            text-shadow: 0 0 10px rgba(0, 170, 255, 0.5);
        }
        .sidebar ul { list-style: none; }
        .sidebar ul li { 
            padding: 15px 30px; 
            border-bottom: 1px solid rgba(0, 170, 255, 0.2);
            transition: .4s ease;
        }
        .sidebar ul li a { 
            color: #fff; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            font-size: 16px;
            transition: .4s ease;
        }
        .sidebar ul li a i { font-size: 22px; color: #0af; }
        .sidebar ul li:hover { background: rgba(0, 170, 255, 0.1); border-left: 4px solid #0af; }
        .sidebar ul li:hover a { color: #0af; }
        
        /* Active Page Highlight */
        .sidebar ul li.active {
            background: rgba(0, 170, 255, 0.15);
            border-left: 4px solid #0af;
        }

        /* --- MAIN CONTENT STYLES --- */
        .main-content { 
            flex: 1; 
            padding: 30px 40px; 
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: transparent; 
            padding: 20px 30px; 
            border-radius: 10px; 
            border: 2px solid #0af;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.2);
        }
        .header h3 { font-size: 24px; font-weight: 500;}

        /* --- SETTINGS CARD STYLES --- */
        .settings-card {
            background: transparent;
            border: 2px solid #0af;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 0 15px rgba(0, 170, 255, 0.1);
            max-width: 600px; /* Keeps the form from getting too wide */
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { 
            display: block; 
            margin-bottom: 8px; 
            color: #fff; 
            font-size: 14px;
            letter-spacing: 0.5px;
        }
        .form-group input { 
            width: 100%; 
            padding: 12px 15px; 
            background: rgba(0, 0, 0, 0.2); 
            border: 1px solid rgba(0, 170, 255, 0.3); 
            border-radius: 5px; 
            color: #fff; 
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }
        .form-group input:focus { 
            border-color: #0af; 
            box-shadow: 0 0 10px rgba(0, 170, 255, 0.2); 
        }

        .save-btn { 
            position: relative;
            padding: 12px 30px;
            background: transparent;
            border: 2px solid #0af;
            outline: none;
            border-radius: 40px;
            cursor: pointer;
            font-size: 16px;
            color: #fff;
            font-weight: 600;
            text-decoration: none;
            z-index: 1;
            overflow: hidden;
            display: inline-block;
            margin-top: 10px;
        }
        .save-btn::before {
            content: '';
            position: absolute;
            top: -100%; left: 0; width: 100%; height: 300%;
            background: linear-gradient(#081b29, #0af, #081b29, #0af);
            z-index: -1; transition: .5s;
        }
        .save-btn:hover::before { top: 0; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>My Shop</h2>
        <ul>
            <li><a href="dashboard.html"><i class='bx bxs-dashboard'></i> Dashboard</a></li>
            <li><a href="inventory.html"><i class='bx bx-box'></i> Inventory</a></li>
            <li><a href="payment.html"><i class='bx bx-rupee'></i> Payments</a></li>
            <li class="active"><a href="settings.html"><i class='bx bx-cog'></i> Settings</a></li>
        </ul>
    </div>

    <div class="main-content">
        <div class="header">
            <h3>Shop Settings</h3>
        </div>

        <div class="settings-card">
            <h4 style="color: #0af; margin-bottom: 25px; font-size: 20px;">Profile Information</h4>
            <form id="settingsForm">
                <div class="form-group">
                    <label>Shop Name</label>
                    <input type="text" value="" required>
                </div>
                <div class="form-group">
                    <label>Owner Name</label>
                    <input type="text" value="" required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" value=" " required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" value=" " required>
                </div>
                <div class="settings-card" style="margin-top: 30px;">
            <h4 style="color: #0af; margin-bottom: 25px; font-size: 20px;">Security & Password</h4>
            <form id="passwordForm">
                <div class="form-group">
                    <label>Current Password</label>
                    <input type="password" id="currentPassword" required>
                </div>
                <div class="form-group">
                    <label>New Password</label>
                    <input type="password" id="newPassword" required>
                </div>
                <div class="form-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirmPassword" required>
                </div>
                
                <button type="submit" class="save-btn">Update Password</button>
            </form>
        </div>

        <div class="settings-card" style="margin-top: 30px;">
            <h4 style="color: #0af; margin-bottom: 25px; font-size: 20px;">Shop Branding</h4>
                <button type="submit" class="save-btn" onclick="alert('Settings saved successfully!')">Save Changes</button>
            </form>
        </div>
    </div> 
        <script>
            // --- CONFIGURATION ---
const API_URL = 'http://localhost:3000';
const SHOP_ID = 1; // Hardcoded for testing. Use localStorage.getItem('shop_id') later!

// --- DOM ELEMENTS: PROFILE ---
const settingsForm = document.getElementById('settingsForm');
const shopNameInput = document.getElementById('shopName');
const ownerNameInput = document.getElementById('ownerName');
const mobileInput = document.getElementById('mobileNum');
const emailInput = document.getElementById('emailAdd');

// --- DOM ELEMENTS: PASSWORD ---
const passwordForm = document.getElementById('passwordForm');
const currentPasswordInput = document.getElementById('currentPassword');
const newPasswordInput = document.getElementById('newPassword');
const confirmPasswordInput = document.getElementById('confirmPassword');

// --- 1. LOAD DATA: PRE-FILL THE PROFILE FORM ---
async function loadShopProfile() {
    try {
        const response = await fetch(`${API_URL}/api/shop/${SHOP_ID}`);
        if (response.ok) {
            const shopData = await response.json();
            
            // Fill the inputs with the data from MySQL
            shopNameInput.value = shopData.shop_name;
            ownerNameInput.value = shopData.owner_name;
            mobileInput.value = shopData.mobile;
            emailInput.value = shopData.email;
        }
    } catch (error) {
        console.error('Error loading profile:', error);
    }
}

// --- 2. UPDATE DATA: SAVE PROFILE SETTINGS ---
settingsForm.addEventListener('submit', async (e) => {
    e.preventDefault(); 

    try {
        const response = await fetch(`${API_URL}/api/shop/${SHOP_ID}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                shopName: shopNameInput.value,
                ownerName: ownerNameInput.value,
                mobile: mobileInput.value,
                email: emailInput.value
            })
        });

        const data = await response.json();
        
        if (response.ok) {
            alert('Profile saved successfully!'); 
        } else {
            alert('Error: ' + data.error);
        }
    } catch (error) {
        console.error('Error saving settings:', error);
    }
});

// --- 3. UPDATE PASSWORD ---
passwordForm.addEventListener('submit', async (e) => {
    e.preventDefault();

    const currentPassword = currentPasswordInput.value;
    const newPassword = newPasswordInput.value;
    const confirmPassword = confirmPasswordInput.value;

    // Basic frontend validation
    if (newPassword !== confirmPassword) {
        alert("New passwords do not match!");
        return;
    }

    try {
        const response = await fetch(`${API_URL}/api/shop/${SHOP_ID}/password`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ currentPassword, newPassword })
        });

        const data = await response.json();
        
        if (response.ok) {
            alert(data.message); // Success!
            passwordForm.reset(); // Clear the password fields
        } else {
            alert('Error: ' + data.error);
        }
    } catch (error) {
        console.error('Error updating password:', error);
    }
});

// --- START ---
loadShopProfile(); // Run this immediately to fetch the user's info
        </script>

    <script src="script.js"></script>
</body>
</html>
